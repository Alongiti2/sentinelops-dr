id: DR-K8S-001
title: Service Account Listed Secrets in kube-system Namespace
status: stable
description: >
  Detects a ServiceAccount listing all secrets in the kube-system
  namespace. kube-system holds cluster-critical secrets (e.g. service
  account tokens, bootstrap tokens); broad listing here by a workload
  identity is rarely legitimate and is a common credential-access
  pattern in Kubernetes attacks.
attack_technique: T1552.007  # Unsecured Credentials: Container API
attack_tactic: Credential Access
severity: high
source_system: k8s_audit
logsource:
  service: kube-apiserver
detection:
  verb: list
  target_resource: secrets
  target_namespace: kube-system
  actor_type: ServiceAccount
false_positives:
  - Cluster add-ons (e.g. cert-manager, external-secrets operator) with
    legitimate cluster-wide secret read access -- should be allow-listed
    by service account name.
references:
  - https://attack.mitre.org/techniques/T1552/007/
